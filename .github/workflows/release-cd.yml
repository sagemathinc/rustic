name: Release Linux Binaries

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  BINARY_NAME: rustic

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: linux-x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            asset_name: linux-arm64
            use_cross: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # v1
        with:
          toolchain: 1.88.0
          target: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install --locked cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --locked --release --target ${{ matrix.target }}
          else
            cargo build --locked --release --target ${{ matrix.target }}
          fi

      - name: Package release artifact
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          staging="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${staging}/${BINARY_NAME}"
          chmod 755 "${staging}/${BINARY_NAME}"
          archive="${BINARY_NAME}-${version}-${{ matrix.asset_name }}.tar.gz"
          tar -C "${staging}" -czf "${archive}" "${BINARY_NAME}"
          sha256sum "${archive}" > "${archive}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            rustic-*.tar.gz
            rustic-*.tar.gz.sha256

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            */rustic-*.tar.gz
            */rustic-*.tar.gz.sha256
